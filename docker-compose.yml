services:
  app:
    build: .
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    working_dir: /app
    environment:
      - NODE_ENV=development
      - VITE_SHOW_DEV_LOGIN=true
      - VITE_LOCAL_CSV_FIXTURE_FOLDER=happy-path
    command: tail -f /dev/null
    networks:
      illo3d-network:
        aliases:
          - web

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - NODE_ENV=development
    networks:
      - illo3d-network

networks:
  illo3d-network:
    driver: bridge
